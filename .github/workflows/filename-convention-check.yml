name: Filenaming Convention Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-filenames:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > files.txt
          cat files.txt

      - name: Validate filenames
        run: |
          violations=0
          while IFS= read -r file; do
            if [[ "$file" =~ [A-Z] || "$file" =~ " " ]]; then
              echo "Invalid filename: $file"
              violations=1
            fi
          done < files.txt

          if [ $violations -ne 0 ]; then
            echo "Filename convention violated (uppercase or spaces found)."
            exit 1
          fi